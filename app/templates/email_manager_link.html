<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בריף חדש לאישור — {{ client_name }}</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f1; padding: 30px 0; margin: 0; direction: rtl;">
  <div style="max-width: 560px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 18px rgba(0,0,0,0.08);">

    <!-- Header -->
    <div style="background: #141414; padding: 22px 28px; color: #fff;">
      <span style="display: inline-block; width: 9px; height: 9px; background: #E8722A; border-radius: 2px; vertical-align: middle; margin-left: 10px;"></span>
      <span style="font-weight: 700; font-size: 18px; vertical-align: middle; letter-spacing: -0.01em;">Smart Brief · Selected</span>
    </div>

    <!-- Body -->
    <div style="padding: 32px 28px; color: #1a1a1a;">
      <h1 style="font-size: 24px; margin: 0 0 12px; font-weight: 800; letter-spacing: -0.02em;">
        בריף חדש לאישור
      </h1>
      <p style="font-size: 15px; line-height: 1.65; color: #4a4a44; margin: 0 0 22px;">
        הצוות סיים בריף חדש עבור <strong style="color: #1a1a1a;">{{ client_name }}</strong>.
        Claude כבר ביצע ליטוש ובדיקת עקביות. כעת ממתינים לאישורך.
      </p>

      <!-- CTA Button -->
      <div style="text-align: center; margin: 28px 0 24px;">
        <a href="{{ link }}"
           style="display: inline-block; background: #E8722A; color: #fff; padding: 14px 36px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 16px; box-shadow: 0 4px 12px rgba(232,114,42,0.35);">
          פתח לעריכה ←
        </a>
      </div>

      <p style="font-size: 12.5px; color: #888882; margin: 24px 0 0; text-align: center; line-height: 1.5;">
        או העתק את הקישור:<br>
        <span style="font-family: 'Courier New', monospace; color: #4a4a44; font-size: 11.5px; direction: ltr; display: inline-block;">{{ link }}</span>
      </p>
    </div>

    <!-- Footer -->
    <div style="background: #f4f4f1; padding: 16px 28px; font-size: 11px; color: #888; text-align: center; letter-spacing: 0.08em;">
      Selected · Digital Marketing Agency
    </div>
  </div>
</body>
</html>
